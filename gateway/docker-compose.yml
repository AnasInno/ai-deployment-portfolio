services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      GATEWAY_DB_PATH: /data/gateway.db
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:-}
    volumes:
      - gateway-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  gateway-data:
