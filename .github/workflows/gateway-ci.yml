name: Gateway CI

on:
  push:
    branches:
      - main
    paths:
      - "gateway/**"
      - ".github/workflows/gateway-ci.yml"
  pull_request:
    paths:
      - "gateway/**"
      - ".github/workflows/gateway-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest
      - name: Smoke deployment gateway
        run: |
          set -euo pipefail
          GATEWAY_DB_PATH=/tmp/gateway-ci.db GATEWAY_API_KEY=ci-key \
            python -m uvicorn app.main:app --host 127.0.0.1 --port 8030 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          python - <<'PY'
          import time
          from urllib import request

          for _ in range(40):
              try:
                  request.urlopen("http://127.0.0.1:8030/health", timeout=1)
                  raise SystemExit(0)
              except Exception:
                  time.sleep(0.25)
          raise SystemExit("gateway did not become healthy")
          PY
          GATEWAY_API_KEY=ci-key python scripts/smoke_gateway.py --base-url http://127.0.0.1:8030
